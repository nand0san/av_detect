name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Diagnostic
        shell: bash
        run: |
          echo "SHA: $(git rev-parse HEAD)"
          echo "--- main.cpp lines 28-52 ---"
          sed -n '28,52p' main.cpp
          echo "--- CMakeLists.txt ---"
          cat CMakeLists.txt

      - name: Configure CMake (MSVC Release)
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Find and verify binary
        shell: cmd
        run: |
          dir /s /b build\av_detect.exe
          for /r build %%f in (av_detect.exe) do "%%f"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: av_detect-windows-x64
          path: build/**/av_detect.exe
