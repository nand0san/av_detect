name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (MSVC Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Verify binary
        run: |
          dir build\bin\Release\av_detect.exe
          build\bin\Release\av_detect.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: av_detect-windows-x64
          path: build/bin/Release/av_detect.exe
